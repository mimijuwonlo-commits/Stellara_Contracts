# =============================================================================
# Stellara Backend PostgreSQL Configuration
# Backup & Disaster Recovery Optimized Settings
# =============================================================================

# -----------------------------------------------------------------------------
# CONNECTIONS AND AUTHENTICATION
# -----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 200
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# WAL ARCHIVING FOR POINT-IN-TIME RECOVERY (PITR)
# -----------------------------------------------------------------------------
# Enable WAL archiving for disaster recovery
wal_level = replica                    # Minimal WAL for replication/archiving
archive_mode = on                      # Enable WAL archiving
archive_command = '/usr/local/bin/wal-archive.sh "%p" "%f"'
archive_timeout = 300                  # Force archive every 5 minutes (300s)

# WAL file management
max_wal_size = 2GB                     # Max WAL size before forced checkpoint
min_wal_size = 512MB                   # Min WAL size to maintain
wal_keep_size = 1GB                    # Keep at least 1GB of WAL files

# -----------------------------------------------------------------------------
# CHECKPOINTS
# -----------------------------------------------------------------------------
checkpoint_timeout = 10min             # Checkpoint every 10 minutes
checkpoint_completion_target = 0.9     # Spread checkpoint I/O over 90% of interval
checkpoint_flush_after = 256kB         # Flush after 256KB during checkpoint

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOGGING PERFORMANCE
# -----------------------------------------------------------------------------
wal_buffers = 16MB                     # WAL buffer size
wal_writer_delay = 200ms               # WAL writer sleep interval
wal_writer_flush_after = 1MB           # Flush WAL after 1MB

# -----------------------------------------------------------------------------
# QUERY TUNING
# -----------------------------------------------------------------------------
shared_buffers = 256MB                 # Shared memory for caching
effective_cache_size = 768MB           # Estimate of memory available for caching
work_mem = 4MB                         # Memory for query operations
maintenance_work_mem = 64MB            # Memory for maintenance operations

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000      # Log queries > 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

# -----------------------------------------------------------------------------
# AUTOVACUUM
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# -----------------------------------------------------------------------------
# SSL (Production should enable)
# -----------------------------------------------------------------------------
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'

# -----------------------------------------------------------------------------
# STATISTICS AND MONITORING
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
