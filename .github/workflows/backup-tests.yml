name: Backup Verification Tests

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      test_type:
        description: 'Type of test to run'
        required: true
        default: 'full'
        type: choice
        options: [full, restore-only, verify-only]

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # ============================================================================
  # Backup Integrity Verification
  # ============================================================================
  verify-backup-integrity:
    name: Verify Latest Backup
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find latest backup
        id: find-backup
        run: |
          BUCKET="${{ secrets.S3_BACKUP_BUCKET }}"
          LATEST_BACKUP=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "postgresql/" \
            --query 'sort_by(Contents, &LastModified)[-1].Key' \
            --output text)
          
          echo "latest_backup=$LATEST_BACKUP" >> $GITHUB_OUTPUT
          echo "Latest backup: $LATEST_BACKUP"

      - name: Download and verify backup
        run: |
          BUCKET="${{ secrets.S3_BACKUP_BUCKET }}"
          BACKUP_KEY="${{ steps.find-backup.outputs.latest_backup }}"
          TEMP_FILE="/tmp/backup-verify.dump"
          
          echo "Downloading backup: $BACKUP_KEY"
          aws s3 cp "s3://$BUCKET/$BACKUP_KEY" "$TEMP_FILE"
          
          echo "Calculating checksum..."
          LOCAL_CHECKSUM=$(sha256sum "$TEMP_FILE" | cut -d' ' -f1)
          echo "Local checksum: $LOCAL_CHECKSUM"
          
          echo "Retrieving S3 metadata..."
          S3_METADATA=$(aws s3api head-object \
            --bucket "$BUCKET" \
            --key "$BACKUP_KEY")
          
          S3_CHECKSUM=$(echo "$S3_METADATA" | jq -r '.Metadata.sha256 // empty')
          echo "S3 checksum: $S3_CHECKSUM"
          
          if [ -n "$S3_CHECKSUM" ] && [ "$LOCAL_CHECKSUM" != "$S3_CHECKSUM" ]; then
            echo "ERROR: Checksum mismatch!"
            exit 1
          fi
          
          echo "Backup integrity verified successfully"
          
          # Get backup size
          BACKUP_SIZE=$(stat -c%s "$TEMP_FILE")
          echo "Backup size: $BACKUP_SIZE bytes"
          echo "backup_size=$BACKUP_SIZE" >> $GITHUB_ENV

      - name: Test restore to temporary database
        if: github.event.inputs.test_type != 'verify-only'
        run: |
          # Start PostgreSQL service
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE DATABASE test_restore;"
          
          # Restore backup
          sudo -u postgres pg_restore \
            -d test_restore \
            --verbose --no-owner --no-privileges \
            /tmp/backup-verify.dump 2>&1 || true
          
          # Verify tables exist
          TABLE_COUNT=$(sudo -u postgres psql -d test_restore -t -c "
            SELECT COUNT(*) FROM information_schema.tables 
            WHERE table_schema = 'public';
          " | xargs)
          
          echo "Restored tables: $TABLE_COUNT"
          
          if [ "$TABLE_COUNT" -lt 5 ]; then
            echo "ERROR: Too few tables restored"
            exit 1
          fi
          
          # Cleanup
          sudo -u postgres psql -c "DROP DATABASE test_restore;"
          rm -f /tmp/backup-verify.dump

      - name: Report results
        if: always()
        run: |
          echo "## Backup Verification Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backup:** ${{ steps.find-backup.outputs.latest_backup }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ env.backup_size }} bytes" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # WAL Archive Verification
  # ============================================================================
  verify-wal-archives:
    name: Verify WAL Archives
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check WAL archive continuity
        run: |
          BUCKET="${{ secrets.WAL_ARCHIVE_BUCKET }}"
          
          # List WAL files from last 24 hours
          CUTOFF_DATE=$(date -d '24 hours ago' --iso-8601=seconds)
          
          WAL_FILES=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "wal/" \
            --query "Contents[?LastModified>='$CUTOFF_DATE'].Key" \
            --output text)
          
          WAL_COUNT=$(echo "$WAL_FILES" | wc -w)
          echo "WAL files in last 24h: $WAL_COUNT"
          
          if [ "$WAL_COUNT" -lt 10 ]; then
            echo "WARNING: Low number of WAL archives"
          fi
          
          echo "wal_count=$WAL_COUNT" >> $GITHUB_ENV

      - name: Report WAL status
        if: always()
        run: |
          echo "## WAL Archive Verification" >> $GITHUB_STEP_SUMMARY
          echo "- **WAL files (24h):** ${{ env.wal_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # RTO/RPO Measurement
  # ============================================================================
  measure-recovery-metrics:
    name: Measure RTO/RPO
    runs-on: ubuntu-latest
    needs: [verify-backup-integrity]
    if: github.event.inputs.test_type == 'full'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Measure RTO (Recovery Time Objective)
        run: |
          BUCKET="${{ secrets.S3_BACKUP_BUCKET }}"
          
          # Find and download latest backup
          LATEST_BACKUP=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "postgresql/" \
            --query 'sort_by(Contents, &LastModified)[-1].Key' \
            --output text)
          
          START_TIME=$(date +%s.%N)
          
          # Download
          aws s3 cp "s3://$BUCKET/$LATEST_BACKUP" /tmp/rto-test.dump
          
          # Start PostgreSQL
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE DATABASE rto_test;"
          
          # Restore
          sudo -u postgres pg_restore -d rto_test /tmp/rto-test.dump 2>&1 || true
          
          END_TIME=$(date +%s.%N)
          
          RTO=$(echo "$END_TIME - $START_TIME" | bc)
          RTO_MINUTES=$(echo "scale=2; $RTO / 60" | bc)
          
          echo "RTO: ${RTO_MINUTES} minutes"
          echo "rto_minutes=$RTO_MINUTES" >> $GITHUB_ENV
          
          # Cleanup
          sudo -u postgres psql -c "DROP DATABASE rto_test;"
          rm -f /tmp/rto-test.dump

      - name: Measure RPO (Recovery Point Objective)
        run: |
          BUCKET="${{ secrets.S3_BACKUP_BUCKET }}"
          
          # Get latest backup timestamp
          LATEST_BACKUP_TIME=$(aws s3api list-objects-v2 \
            --bucket "$BUCKET" \
            --prefix "postgresql/" \
            --query 'sort_by(Contents, &LastModified)[-1].LastModified' \
            --output text)
          
          CURRENT_TIME=$(date -u +%s)
          BACKUP_TIME=$(date -d "$LATEST_BACKUP_TIME" +%s)
          
          RPO_SECONDS=$((CURRENT_TIME - BACKUP_TIME))
          RPO_MINUTES=$(echo "scale=2; $RPO_SECONDS / 60" | bc)
          
          echo "RPO: ${RPO_MINUTES} minutes"
          echo "rpo_minutes=$RPO_MINUTES" >> $GITHUB_ENV

      - name: Report RTO/RPO
        if: always()
        run: |
          echo "## RTO/RPO Measurements" >> $GITHUB_STEP_SUMMARY
          echo "- **RTO (Recovery Time):** ${{ env.rto_minutes }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **RPO (Data Loss Window):** ${{ env.rpo_minutes }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "- **Target RTO:** 240 minutes (4 hours)" >> $GITHUB_STEP_SUMMARY
          echo "- **Target RPO:** 60 minutes (1 hour)" >> $GITHUB_STEP_SUMMARY
          
          # Check compliance
          RTO_COMPLIANT=$(echo "${{ env.rto_minutes }} < 240" | bc)
          RPO_COMPLIANT=$(echo "${{ env.rpo_minutes }} < 60" | bc)
          
          if [ "$RTO_COMPLIANT" -eq 1 ] && [ "$RPO_COMPLIANT" -eq 1 ]; then
            echo "- **Compliance:** PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Compliance:** FAIL" >> $GITHUB_STEP_SUMMARY
          fi

  # ============================================================================
  # Notification
  # ============================================================================
  notify-results:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [verify-backup-integrity, verify-wal-archives, measure-recovery-metrics]
    if: always()

    steps:
      - name: Send Slack notification
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{
              "text": "Backup verification tests failed!",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Workflow", "value": "Backup Verification Tests", "short": true},
                  {"title": "Status", "value": "FAILED", "short": true}
                ]
              }]
            }' || true
